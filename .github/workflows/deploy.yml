name: Deploy to Custom Domain

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip data validation'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  SITE_URL: 'https://aiskill.qzz.io'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      data_valid: ${{ steps.validate.outputs.valid }}
      skill_count: ${{ steps.validate.outputs.count }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install root dependencies
        run: npm ci --prefer-offline
        
      - name: Run import script
        id: import
        run: |
          npm run import-skills || echo "Import script not found, skipping..."
          echo "import_completed=true" >> $GITHUB_OUTPUT
        
      - name: Validate skills data
        id: validate
        run: |
          if [ "${{ github.event.inputs.skip_validation }}" = "true" ]; then
            echo "⏭️ Skipping validation as requested"
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TOTAL_COUNT=0
          
          # Validate main skills data
          if [ -f "web/src/skills-data.json" ]; then
            SKILLS_VALID=$(node -e "
              const fs = require('fs');
              try {
                const data = JSON.parse(fs.readFileSync('web/src/skills-data.json', 'utf8'));
                if (!data.skills || !Array.isArray(data.skills) || data.skills.length === 0) process.exit(1);
                console.log(data.skills.length);
              } catch (e) { process.exit(1); }
            " 2>&1)
            if [ $? -eq 0 ]; then
              echo "✅ skills-data.json valid: $SKILLS_VALID skills"
              TOTAL_COUNT=$((TOTAL_COUNT + SKILLS_VALID))
            else
              echo "⚠️ skills-data.json validation skipped"
            fi
          fi
          
          # Validate AI Tools and Roles system (v7.0 new feature)
          if [ -f "web/public/ai-tools.json" ]; then
            AI_TOOLS_VALID=$(node -e "
              const fs = require('fs');
              try {
                const data = JSON.parse(fs.readFileSync('web/public/ai-tools.json', 'utf8'));
                if (!data.tools || !Array.isArray(data.tools)) process.exit(1);
                if (!data.categories || !Array.isArray(data.categories)) process.exit(1);
                console.log(data.tools.length + ' tools, ' + data.categories.length + ' categories');
                console.log(data.tools.length);
              } catch (e) {
                console.log('Error: ' + e.message);
                process.exit(1);
              }
            " 2>&1)
            if [ $? -eq 0 ]; then
              TOOLS_COUNT=$(echo "$AI_TOOLS_VALID" | tail -1)
              echo "✅ ai-tools.json valid: $(echo "$AI_TOOLS_VALID" | head -1)"
              TOTAL_COUNT=$((TOTAL_COUNT + TOOLS_COUNT))
            else
              echo "❌ ai-tools.json validation failed"
              echo "valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          echo "✅ All data validation passed"
          echo "📊 Total items: $TOTAL_COUNT"
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "count=$TOTAL_COUNT" >> $GITHUB_OUTPUT

  build:
    needs: validate
    if: needs.validate.outputs.data_valid == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install web dependencies
        working-directory: ./web
        run: npm ci --prefer-offline
        
      - name: Type check
        working-directory: ./web
        run: npx tsc --noEmit || echo "Type check completed with warnings"
        
      - name: Lint check
        working-directory: ./web
        run: npm run lint || echo "Lint check completed with warnings"
        
      - name: Build Next.js app
        working-directory: ./web
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          SITE_URL: ${{ env.SITE_URL }}
        
      - name: Verify build output
        run: |
          if [ ! -d "web/out" ]; then
            echo "❌ Build output directory not found"
            exit 1
          fi
          
          if [ ! -f "web/out/index.html" ]; then
            echo "❌ index.html not found in build output"
            exit 1
          fi
          
          echo "✅ Build verification passed"
          echo "📁 Build size: $(du -sh web/out | cut -f1)"
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Time: $(date)"
          echo "📊 Skills deployed: ${{ needs.validate.outputs.skill_count }}"

  notify-failure:
    needs: [validate, build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Create failure summary
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "### Failure Details"
          echo "- **Workflow**: ${{ github.workflow }}"
          echo "- **Run ID**: ${{ github.run_id }}"
          echo "- **Branch**: ${{ github.ref }}"
          echo "- **Commit**: ${{ github.sha }}"
          echo "- **Actor**: ${{ github.actor }}"
          echo ""
          echo "Please check the logs for more details."
